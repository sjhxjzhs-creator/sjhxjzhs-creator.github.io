<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sjhxjzhs</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #5f6dfd, #9b59b6);
  color: white;
  text-align: center;
}

.card {
  background: rgba(255,255,255,0.1);
  margin: 20px;
  padding: 20px;
  border-radius: 20px;
}

.bar {
  background: rgba(255,255,255,0.2);
  border-radius: 10px;
  margin: 10px 0;
}
.bar div {
  height: 10px;
  background: #00ffcc;
  border-radius: 10px;
}

/* 游戏 */
canvas {
  background: #111;
  border-radius: 10px;
  box-shadow: 0 0 20px #00ffcc;
}

/* 按钮 */
button {
  margin: 10px;
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background: #00ffcc;
  color: black;
  font-weight: bold;
}

/* 分数 */
#scoreBoard {
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>sjhxjzhs 🚀</h1>
<p>一个正在学习编程的 cAt 🐱</p>

<div class="card">
  <h2>💻 技能</h2>
  HTML
  <div class="bar"><div style="width:80%"></div></div>
  CSS
  <div class="bar"><div style="width:70%"></div></div>
  JavaScript
  <div class="bar"><div style="width:50%"></div></div>
</div>

<div class="card">
  <h2>🎮 贪吃蛇（炫酷版）</h2>

  <button id="startBtn">Start Game</button>

  <div id="scoreBoard">
    分数: <span id="score">0</span> |
    最高分: <span id="highScore">0</span>
  </div>

  <canvas id="gameCanvas" width="300" height="300"></canvas>
</div>

<div class="card">
  <h2>📊 访客统计</h2>
  <p>你是第 <span id="visitor">0</span> 位访客</p>
</div>

<div class="card">
  <h2>📬 联系我</h2>
  <p>Email: sjhxjzhs@gmail.com</p>
  <p>QQ: 1650613782</p>
  <p>GitHub: sjhxjzhs-creator</p>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const startBtn = document.getElementById("startBtn");

let gameRunning = false;
let gameLoop;
let snake, direction, food, score;

let highScore = localStorage.getItem("highScore") || 0;
document.getElementById("highScore").innerText = highScore;

// 初始化
function initGame() {
  snake = [{ x: 150, y: 150 }];
  direction = "RIGHT";
  food = randomFood();
  score = 0;
  document.getElementById("score").innerText = score;
}

// 食物
function randomFood() {
  return {
    x: Math.floor(Math.random() * 15) * 20,
    y: Math.floor(Math.random() * 15) * 20
  };
}

// 开始
startBtn.onclick = () => {
  initGame();
  gameRunning = true;
  startBtn.innerText = "Restart";

  if (gameLoop) clearInterval(gameLoop);
  gameLoop = setInterval(draw, 100);
};

// 键盘控制
document.addEventListener("keydown", e => {
  if (!gameRunning) return;
  if (e.key === "ArrowUp" && direction !== "DOWN") direction = "UP";
  if (e.key === "ArrowDown" && direction !== "UP") direction = "DOWN";
  if (e.key === "ArrowLeft" && direction !== "RIGHT") direction = "LEFT";
  if (e.key === "ArrowRight" && direction !== "LEFT") direction = "RIGHT";
});

// 手机滑动
let touchStartX, touchStartY;

canvas.addEventListener("touchstart", e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
});

canvas.addEventListener("touchend", e => {
  let dx = e.changedTouches[0].clientX - touchStartX;
  let dy = e.changedTouches[0].clientY - touchStartY;

  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx > 0 && direction !== "LEFT") direction = "RIGHT";
    else if (dx < 0 && direction !== "RIGHT") direction = "LEFT";
  } else {
    if (dy > 0 && direction !== "UP") direction = "DOWN";
    else if (dy < 0 && direction !== "DOWN") direction = "UP";
  }
});

// 画面
function draw() {
  ctx.fillStyle = "#111";
  ctx.fillRect(0, 0, 300, 300);

  let head = { ...snake[0] };

  if (direction === "UP") head.y -= 20;
  if (direction === "DOWN") head.y += 20;
  if (direction === "LEFT") head.x -= 20;
  if (direction === "RIGHT") head.x += 20;

  // 撞墙/自撞
  if (
    head.x < 0 || head.y < 0 ||
    head.x >= 300 || head.y >= 300 ||
    snake.some(s => s.x === head.x && s.y === head.y)
  ) {
    gameRunning = false;
    clearInterval(gameLoop);

    if (score > highScore) {
      highScore = score;
      localStorage.setItem("highScore", highScore);
      document.getElementById("highScore").innerText = highScore;
    }

    setTimeout(() => alert("Game Over! 分数: " + score), 50);
    return;
  }

  snake.unshift(head);

  // 吃
  if (head.x === food.x && head.y === food.y) {
    score++;
    document.getElementById("score").innerText = score;
    food = randomFood();
  } else {
    snake.pop();
  }

  // 发光蛇
  ctx.shadowColor = "#00ffcc";
  ctx.shadowBlur = 10;
  ctx.fillStyle = "#00ffcc";
  snake.forEach(s => ctx.fillRect(s.x, s.y, 18, 18));

  ctx.shadowBlur = 0;

  // 食物
  ctx.fillStyle = "red";
  ctx.fillRect(food.x, food.y, 18, 18);
}

// 访客统计（简单版）
let visitor = localStorage.getItem("visitor") || 0;
visitor++;
localStorage.setItem("visitor", visitor);
document.getElementById("visitor").innerText = visitor;
</script>

</body>
</html>
