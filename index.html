 <!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>科技风个人主页</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    text-align: center;
}

/* 背景渐变光 */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at top, #3b82f6, transparent);
    opacity: 0.3;
    z-index: -1;
}

/* 容器 */
.container {
    padding: 60px 20px;
}

/* 发光头像 */
.avatar {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    border: 3px solid #3b82f6;
    box-shadow: 0 0 20px #3b82f6;
    transition: 0.3s;
}

.avatar:hover {
    transform: scale(1.1);
    box-shadow: 0 0 40px #60a5fa;
}

/* 名字 */
h1 {
    margin-top: 20px;
    font-size: 34px;
}

/* 简介 */
p {
    opacity: 0.8;
}

/* 技能 */
.skills {
    margin-top: 30px;
}

.skill {
    display: inline-block;
    padding: 8px 16px;
    margin: 6px;
    border: 1px solid #3b82f6;
    border-radius: 20px;
    box-shadow: 0 0 10px #3b82f6;
}

/* 按钮 */
.btn {
    display: inline-block;
    margin: 15px;
    padding: 10px 22px;
    border: 1px solid #3b82f6;
    color: #3b82f6;
    text-decoration: none;
    border-radius: 8px;
    transition: 0.3s;
}

.btn:hover {
    background: #3b82f6;
    color: white;
    box-shadow: 0 0 20px #3b82f6;
}

/* 底部 */
footer {
    margin-top: 60px;
    opacity: 0.6;
    font-size: 14px;
}
</style>

</head>

<body>

<div class="container">

    <!-- 头像（机器人风） -->
    <img src="https://robohash.org/ccx.png" class="avatar">

    <!-- 名字 -->
    <h1>c**</h1>

    <!-- 简介 -->
    <p>探索代码与未来的开发者(看看就好) 🚀</p>

    <!-- 技能 -->
    <div class="skills">
        <div class="skill">HTML</div>
        <div class="skill">CSS</div>
        <div class="skill">Python</div>
        <div class="skill">GitHub</div>
    </div>

    <!-- 联系 -->
    <div>
        <a href="#" class="btn">GitHub</a>
        <a href="#" class="btn">邮箱</a>
    </div>

    <!-- 底部 -->
    <footer>
        © 2026 c⭐⭐🇨🇳
    </footer>

</div>

</body>
</html>
