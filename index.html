<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sjhxjzhs | 个人主页</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg,#667eea,#764ba2);
    color: white;
    text-align: center;
}

/* 卡片 */
.card {
    background: rgba(255,255,255,0.1);
    margin: 20px auto;
    padding: 20px;
    border-radius: 15px;
    width: 85%;
    backdrop-filter: blur(10px);
    transition: 0.3s;
}
.card:hover {
    transform: translateY(-5px);
}

/* 头像 */
.avatar {
    width: 120px;
    border-radius: 50%;
    margin-top: 30px;
}

/* 技能条 */
.bar {
    background: rgba(255,255,255,0.2);
    height: 8px;
    border-radius: 5px;
    overflow: hidden;
}
.bar div {
    height: 100%;
    background: #00ffcc;
    width: 0;
    transition: 1s;
}

/* 游戏区 */
#gameBox {
    display: none;
    margin-top: 20px;
}

canvas {
    background: rgba(0,0,0,0.3);
    border-radius: 10px;
}

/* 按钮 */
button {
    padding: 10px 15px;
    border: none;
    border-radius: 10px;
    margin: 5px;
    background: rgba(255,255,255,0.2);
    color: white;
}

/* 点击粒子 */
@keyframes boom {
    0% {transform: scale(1);opacity:1;}
    100% {transform: scale(6);opacity:0;}
}
</style>
</head>

<body>

<img src="https://robohash.org/sjhxjzhs.png" class="avatar">

<p id="desc"></p>

<div class="card">

<p>CSS</p>

<p>JavaScript</p>
<div class="bar"><div data-width="60%"></div></div>
</div>

<div class="card">
<h2>📬 联系我</h2>
<p>Email: sjhxjzhs@gmail.com
   QQ   :1650613782</p>
<p>
GitHub: 
<a href="https://github.com/sjhxjzhs-creator" target="_blank" style="color:#00ffcc;">
点击访问
</a>
</p>

<button onclick="toggleGame()">🎮 打开/关闭小游戏</button>
</div>

<!-- 游戏 -->
<div id="gameBox">
<h3>🐍 贪吃蛇</h3>
<p>分数：<span id="score">0</span></p>
<canvas id="game" width="300" height="300"></canvas>

<div>
<button onclick="setDir(0,-1)">⬆️</button><br>
<button onclick="setDir(-1,0)">⬅️</button>
<button onclick="setDir(1,0)">➡️</button><br>
<button onclick="setDir(0,1)">⬇️</button>
</div>

<!-- 访客统计 -->
<p>
👁️ 访问量：<span id="busuanzi_value_site_pv"></span> |
👤 访客数：<span id="busuanzi_value_site_uv"></span>
</p>

<script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>

<script>
// 打字效果
const text = "欢迎来到我的主页 🚀";
let i = 0;
function type(){
    if(i<text.length){
        document.getElementById("desc").innerHTML+=text[i];
        i++;
        setTimeout(type,80);
    }
}
type();

// 技能条动画
window.onload = function(){
    document.querySelectorAll(".bar div").forEach(bar=>{
        bar.style.width = bar.getAttribute("data-width");
    });
};

// 点击粒子
document.addEventListener("click", e=>{
    let d=document.createElement("div");
    d.style.position="fixed";
    d.style.left=e.clientX+"px";
    d.style.top=e.clientY+"px";
    d.style.width="8px";
    d.style.height="8px";
    d.style.background="#00ffcc";
    d.style.borderRadius="50%";
    d.style.animation="boom 0.6s";
    document.body.appendChild(d);
    setTimeout(()=>d.remove(),600);
});

// 游戏开关
function toggleGame(){
    let box=document.getElementById("gameBox");
    box.style.display = box.style.display==="none"?"block":"none";
}

// 贪吃蛇
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const size = 15;
let snake=[{x:10,y:10}];
let dir={x:1,y:0};
let food={x:5,y:5};
let score=0;

function draw(){
    ctx.fillStyle="rgba(0,0,0,0.3)";
    ctx.fillRect(0,0,300,300);

    // 食物发光
    ctx.shadowBlur=15;
    ctx.shadowColor="yellow";
    ctx.fillStyle="yellow";
    ctx.fillRect(food.x*size,food.y*size,size,size);
    ctx.shadowBlur=0;

    // 蛇渐变
    snake.forEach(s=>{
        let g=ctx.createLinearGradient(0,0,300,300);
        g.addColorStop(0,"#00f5a0");
        g.addColorStop(1,"#00d9f5");
        ctx.fillStyle=g;
        ctx.fillRect(s.x*size,s.y*size,size-1,size-1);
    });
}

function update(){
    const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};

    if(head.x<0||head.y<0||head.x>=20||head.y>=20||
       snake.some(s=>s.x===head.x&&s.y===head.y)){
        alert("游戏结束："+score);
        location.reload();
    }

    snake.unshift(head);

    if(head.x===food.x&&head.y===food.y){
        score++;
        document.getElementById("score").innerText=score;
        food={x:Math.floor(Math.random()*20),y:Math.floor(Math.random()*20)};
    }else{
        snake.pop();
    }
}

setInterval(()=>{
    update();
    draw();
},120);

// 控制
document.addEventListener("keydown",e=>{
    if(e.key==="ArrowUp"&&dir.y!==1)dir={x:0,y:-1};
    if(e.key==="ArrowDown"&&dir.y!==-1)dir={x:0,y:1};
    if(e.key==="ArrowLeft"&&dir.x!==1)dir={x:-1,y:0};
    if(e.key==="ArrowRight"&&dir.x!==-1)dir={x:1,y:0};
});

function setDir(x,y){
    if(x===-dir.x&&y===-dir.y)return;
    dir={x,y};
}
</script>

</body>
</html>
