<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sjhxjzhs</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #5f6dfd, #9b59b6);
  color: white;
  text-align: center;
}

.card {
  background: rgba(255,255,255,0.1);
  margin: 20px;
  padding: 20px;
  border-radius: 20px;
}

.bar {
  background: rgba(255,255,255,0.2);
  border-radius: 10px;
  margin: 10px 0;
}
.bar div {
  height: 10px;
  background: #00ffcc;
  border-radius: 10px;
}

/* 游戏 */
canvas {
  background: #111;
  border-radius: 10px;
  box-shadow: 0 0 20px #00ffcc;
  touch-action: none;
}

/* 按钮 */
button {
  margin: 5px;
  padding: 10px 15px;
  border: none;
  border-radius: 10px;
  background: #00ffcc;
  color: black;
  font-weight: bold;
}

/* 控制区 */
.controls {
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>sjhxjzhs 🚀</h1>
<p>一个正在学习编程的 cAt 🐱</p>

<div class="card">
  <h2>💻 技能</h2>
  HTML<div class="bar"><div style="width:80%"></div></div>
  CSS<div class="bar"><div style="width:70%"></div></div>
  JavaScript<div class="bar"><div style="width:50%"></div></div>
</div>

<div class="card">
  <h2>🎮 贪吃蛇（进阶版）</h2>

  <button id="startBtn">Start Game</button>

  <p>分数: <span id="score">0</span> | 最高分: <span id="highScore">0</span></p>

  <canvas id="gameCanvas" width="300" height="300"></canvas>

  <!-- 控制按钮 -->
  <div class="controls">
    <button onclick="setDir('UP')">↑</button><br>
    <button onclick="setDir('LEFT')">←</button>
    <button onclick="setDir('DOWN')">↓</button>
    <button onclick="setDir('RIGHT')">→</button>
  </div>

  <p>👉 手机可滑动 / 点按钮控制</p>
</div>

<div class="card">
  <h2>📊 访客统计</h2>
  <p>你是第 <span id="visitor">0</span> 位访客</p>
</div>

<div class="card">
  <h2>📬 联系我</h2>
  <p>Email: sjhxjzhs@gmail.com</p>
  <p>QQ: 1650613782</p>
  <p>GitHub: sjhxjzhs-creator</p>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const startBtn = document.getElementById("startBtn");

let snake, direction, food, score;
let gameLoop, speed;
let gameRunning = false;
let safeTime = 0;

// 高分
let highScore = localStorage.getItem("highScore") || 0;
document.getElementById("highScore").innerText = highScore;

// 初始化
function initGame() {
  snake = [{ x: 150, y: 150 }];
  direction = "RIGHT";
  food = randomFood();
  score = 0;
  speed = 180;
  safeTime = 10;
  document.getElementById("score").innerText = score;
}

// 食物
function randomFood() {
  return {
    x: Math.floor(Math.random() * 15) * 20,
    y: Math.floor(Math.random() * 15) * 20
  };
}

// 开始
startBtn.onclick = () => {
  initGame();
  gameRunning = true;
  startBtn.innerText = "Restart";

  if (gameLoop) clearInterval(gameLoop);
  gameLoop = setInterval(draw, speed);
};

// 键盘
document.addEventListener("keydown", e => {
  if (!gameRunning) return;
  if (e.key === "ArrowUp" && direction !== "DOWN") direction = "UP";
  if (e.key === "ArrowDown" && direction !== "UP") direction = "DOWN";
  if (e.key === "ArrowLeft" && direction !== "RIGHT") direction = "LEFT";
  if (e.key === "ArrowRight" && direction !== "LEFT") direction = "RIGHT";
});

// 按钮控制
function setDir(dir) {
  if (!gameRunning) return;
  if (dir === "UP" && direction !== "DOWN") direction = "UP";
  if (dir === "DOWN" && direction !== "UP") direction = "DOWN";
  if (dir === "LEFT" && direction !== "RIGHT") direction = "LEFT";
  if (dir === "RIGHT" && direction !== "LEFT") direction = "RIGHT";
}

// 防止滑动页面
canvas.addEventListener("touchmove", e => {
  e.preventDefault();
}, { passive: false });

// 滑动控制
let sx, sy;
canvas.addEventListener("touchstart", e => {
  sx = e.touches[0].clientX;
  sy = e.touches[0].clientY;
});
canvas.addEventListener("touchend", e => {
  let dx = e.changedTouches[0].clientX - sx;
  let dy = e.changedTouches[0].clientY - sy;

  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx > 0) setDir("RIGHT");
    else setDir("LEFT");
  } else {
    if (dy > 0) setDir("DOWN");
    else setDir("UP");
  }
});

// 粒子
let particles = [];

function spawnParticles(x, y) {
  for (let i = 0; i < 8; i++) {
    particles.push({
      x, y,
      dx: (Math.random()-0.5)*4,
      dy: (Math.random()-0.5)*4,
      life: 20
    });
  }
}

// 主循环
function draw() {
  ctx.fillStyle = "#111";
  ctx.fillRect(0,0,300,300);

  let head = { ...snake[0] };

  if (direction==="UP") head.y-=20;
  if (direction==="DOWN") head.y+=20;
  if (direction==="LEFT") head.x-=20;
  if (direction==="RIGHT") head.x+=20;

  // 撞
  if (
    safeTime<=0 &&
    (
      head.x<0||head.y<0||
      head.x>=300||head.y>=300||
      snake.some(s=>s.x===head.x&&s.y===head.y)
    )
  ){
    gameRunning=false;
    clearInterval(gameLoop);

    if(score>highScore){
      highScore=score;
      localStorage.setItem("highScore",highScore);
      document.getElementById("highScore").innerText=highScore;
    }

    setTimeout(()=>alert("Game Over："+score),50);
    return;
  }

  if(safeTime>0) safeTime--;

  snake.unshift(head);

  // 吃
  if(head.x===food.x && head.y===food.y){
    score++;
    document.getElementById("score").innerText=score;
    spawnParticles(food.x, food.y);
    food=randomFood();

    // 加速
    if(speed>80){
      speed-=5;
      clearInterval(gameLoop);
      gameLoop=setInterval(draw,speed);
    }

  }else{
    snake.pop();
  }

  // 粒子
  particles.forEach(p=>{
    p.x+=p.dx;
    p.y+=p.dy;
    p.life--;
  });
  particles=particles.filter(p=>p.life>0);

  ctx.fillStyle="yellow";
  particles.forEach(p=>{
    ctx.fillRect(p.x,p.y,3,3);
  });

  // 蛇（发光）
  ctx.shadowColor="#00ffcc";
  ctx.shadowBlur=10;
  ctx.fillStyle="#00ffcc";
  snake.forEach(s=>ctx.fillRect(s.x,s.y,18,18));
  ctx.shadowBlur=0;

  // 食物
  ctx.fillStyle="red";
  ctx.fillRect(food.x,food.y,18,18);
}

// 访客
let v=localStorage.getItem("v")||0;
v++;
localStorage.setItem("v",v);
document.getElementById("visitor").innerText=v;
</script>

</body>
</html>
