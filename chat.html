<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聊天室</title>

<style>
body{margin:0;background:#e5e5e5;font-family:-apple-system;}

.header{
position:fixed;top:0;width:100%;height:60px;
background:#fff;display:flex;align-items:center;
padding:0 12px;border-bottom:1px solid #ddd;
z-index:10;
}

.back{font-size:20px;cursor:pointer;margin-right:10px;}

.chat{
margin-top:70px;margin-bottom:80px;
padding:10px;max-width:600px;margin:auto;
}

.msg{display:flex;margin:10px 0;}
.right{justify-content:flex-end;}

.bubble{
max-width:70%;
padding:10px;
border-radius:10px;
background:#fff;
}
.right .bubble{background:#95ec69;}

.info{
font-size:12px;
color:#666;
margin-top:4px;
}

/* 输入 */
.input{
position:fixed;bottom:0;width:100%;
display:flex;background:#fff;padding:5px;
}

input{flex:1;padding:10px;border:none}

button{border:none;background:#fff;padding:10px;}
</style>
</head>

<body>

<div class="header">
<div class="back" onclick="goBack()">←</div>
<div id="title">聊天室</div>
</div>

<div id="chat" class="chat"></div>

<div class="input">
<button onclick="pickImg()">+</button>
<input id="msg" placeholder="输入消息">
<input type="file" id="imgInput" hidden>
<button onclick="send()">发</button>
</div>

<script type="module">
import {initializeApp} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getDatabase,ref,push,onValue,set
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* Firebase */
const app=initializeApp({
apiKey:"AIzaSy...",
databaseURL:"https://project-8070304670066937245-default-rtdb.firebaseio.com"
});
const db=getDatabase(app);

/* 🔥 获取房间ID */
const params=new URLSearchParams(location.search);
const roomId=params.get("room");

if(!roomId){
alert("房间不存在");
location.href="index.html";
}

/* 🔥 按房间隔离 */
const chatRef=ref(db,"chat/"+roomId);
const roomInfoRef=ref(db,"rooms/"+roomId);

/* DOM */
const chat=document.getElementById("chat");
const msg=document.getElementById("msg");
const imgInput=document.getElementById("imgInput");
const title=document.getElementById("title");

/* UID */
let uid=localStorage.uid||(localStorage.uid="u_"+Math.random().toString(36).slice(2));

/* 用户名 */
let username=localStorage.name||prompt("输入名字");
localStorage.name=username;

/* 返回 */
window.goBack=()=>{
history.back();
};

/* 房间名 */
onValue(roomInfoRef,snap=>{
let d=snap.val();
if(d){
title.innerText=d.name;
}
});

/* 时间 */
function formatTime(t){
let d=new Date(t);
return d.getHours().toString().padStart(2,"0")+":"+
d.getMinutes().toString().padStart(2,"0");
}

/* 发送 */
window.send=()=>{
let t=msg.value.trim();
if(!t)return;

push(chatRef,{
name:username,
uid,
text:t,
time:Date.now(),
read:{[uid]:true}
});
msg.value="";
};

/* 图片 */
window.pickImg=()=>imgInput.click();

imgInput.onchange=e=>{
let f=e.target.files[0];
if(!f)return;

let r=new FileReader();
r.onload=()=>{
push(chatRef,{
name:username,
uid,
img:r.result,
time:Date.now(),
read:{[uid]:true}
});
};
r.readAsDataURL(f);
};

/* 已读 */
function markRead(id,d){
if(!d.read || !d.read[uid]){
set(ref(db,"chat/"+roomId+"/"+id+"/read/"+uid),true);
}
}

/* 渲染 */
onValue(chatRef,snap=>{
chat.innerHTML="";
let data=snap.val()||{};

Object.entries(data).forEach(([id,d])=>{

markRead(id,d);

let readCount=Object.keys(d.read||{}).length;

let div=document.createElement("div");
div.className="msg "+(d.uid===uid?"right":"left");

div.innerHTML=`
<div class="bubble">
<b>${d.name||"匿名"}</b><br>
${d.text||""}
${d.img?`<img src="${d.img}" style="max-width:200px;border-radius:8px">`:""}

<div class="info">
${readCount}人已读 · ${formatTime(d.time||Date.now())}
</div>
</div>
`;

chat.appendChild(div);
});

/* 自动滚动 */
chat.scrollTop=chat.scrollHeight;
});
</script>

</body>
</html>
